name: secret scan

on:
  # Only the default branch on push; PR branches are covered by pull_request,
  # so a branch with an open PR is not scanned twice for the same commit.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Gitleaks
    # macOS runner: Homebrew is preinstalled, so gitleaks installs without any
    # third-party action. Standard runners are free on public repositories.
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out full history
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        run: brew install gitleaks

      - name: Scan published history
        run: bash scripts/check-secrets.sh
