name: secret scan

on:
  push:
    branches: [main]
  # pull_request_target, not pull_request — deliberately.
  #
  # With `pull_request`, the runner checks out the CONTRIBUTOR's tree, including
  # their copy of scripts/check-secrets.sh and .gitleaks.toml. A pull request
  # could then add a secret and rewrite the scanner to exit 0, producing a green
  # required check: the gate would be bypassable by the very change it inspects.
  #
  # pull_request_target runs the workflow and the scanner from the BASE branch,
  # which the contributor cannot modify. The pull request's tree is checked out
  # separately and treated strictly as DATA to scan — nothing from it is ever
  # executed, no build or install step runs against it, and the token is not
  # persisted. That is what makes pull_request_target safe here.
  pull_request_target:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Gitleaks
    # macOS runner: Homebrew is preinstalled, so gitleaks installs without any
    # third-party action. Standard runners are free on public repositories.
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Check out trusted base (scanner and config)
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check out the pull request as data only
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-under-review
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        run: brew install gitleaks

      - name: Scan the tree under review
        env:
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "${EVENT}" = "pull_request_target" ]; then
            # Trusted scanner from the base checkout, pointed at the PR tree.
            bash scripts/check-secrets.sh pr-under-review
          else
            bash scripts/check-secrets.sh
          fi
